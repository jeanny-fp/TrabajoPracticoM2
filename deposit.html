<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <main class="billetera-container">

        <header class="page-header">
            <a href="menu.html" class="back-btn"><i class="bi bi-chevron-left"></i></a>
            <h2 class="page-title">Recargar</h2>
        </header>

        <div id="alert-container"></div>

        <form id="depositForm" style="display: none;" class="mt-4">

            <div class="text-center mb-5 mt-2">
                <p class="text-muted small fw-bold">Saldo actual: <span id="currentBalance" class="text-primary"></span></p>
                <input type="number" class="large-amount-input" id="amount" placeholder="$0" min="1" step="1" required>
                <div class="text-muted small">Ingresa el monto a depositar</div>
            </div>

            <div class="form-group mt-5" style="position: absolute; bottom: 100px; width: 100%; left: 0;">
                <button type="submit" class="btn-primary-custom btn-action">
                    Confirmar Depósito
                </button>
            </div>
        </form>

                <nav class="bottom-nav">
            <a href="menu.html" class="nav-item">
                <i class="bi bi-house-door-fill"></i> Inicio
            </a>
            <a href="transactions.html" class="nav-item">
                <i class="bi bi-bar-chart-fill"></i> Estadísticas
            </a>
            <a href="deposit.html" class="nav-item active">
                <i class="bi bi-wallet-fill"></i> Billetera
            </a>
            <a href="login.html" class="nav-item">
                <i class="bi bi-person-fill"></i> Perfil
            </a>
        </nav>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            const saldoInicial = obtenerSaldo();
            $('#currentBalance').text('$' + saldoInicial.toLocaleString('es-CL'));

            $('#depositForm').slideDown(500);

            $('#depositForm').submit(function(e) {
                e.preventDefault();
                const btn = $('.btn-action');
                const monto = parseFloat($('#amount').val());

                if (monto && monto > 0) {
                    btn.prop('disabled', true).html('<div class="spinner-border spinner-border-sm text-white"></div> Procesando');

                    const saldoActual = obtenerSaldo();
                    const nuevoSaldo = saldoActual + monto;

                    actualizarSaldo(nuevoSaldo);
                    agregarMovimiento('Ingreso', monto, 'Recarga de saldo');

                    $({ Counter: saldoActual }).animate({
                        Counter: nuevoSaldo
                    }, {
                        duration: 800,
                        easing: 'swing',
                        step: function (now) {
                            $('#currentBalance').text('$' + Math.ceil(now).toLocaleString('es-CL'));
                        }
                    });

                    setTimeout(() => {
                        const alertHtml = `
                            <div class="alert alert-success alert-custom mt-3 text-center border-0 bg-success text-white" role="alert" style="display:none;" id="successAlert">
                                <i class="bi bi-check-circle-fill fs-1 d-block mb-2"></i>
                                Recarga exitosa.<br><strong class="fs-4">$${monto.toLocaleString('es-CL')}</strong>
                            </div>
                        `;
                        $('#alert-container').html(alertHtml);
                        $('#successAlert').slideDown();

                        btn.html('Completado').css('background', '#10B981');

                        setTimeout(function() {
                            window.location.href = 'menu.html';
                        }, 2000);
                    }, 800);
                }
            });
        });
    </script>
</body>
</html>
