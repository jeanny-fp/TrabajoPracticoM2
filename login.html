<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <main class="billetera-container d-flex flex-column justify-content-center">

        <header class="login-header">
            <i class="bi bi-wallet2"></i>
            <h2 class="fw-bold fs-3 text-dark">Alke Wallet</h2>
            <p class="text-muted small">Ingresa para administrar tus finanzas</p>

            <div id="errorMsg" class="alert alert-danger alert-custom mt-3" style="display: none;" role="alert">Credenciales incorrectas.</div>
            <div id="successMsg" class="alert alert-success alert-custom mt-3" style="display: none;" role="alert">¡Bienvenido! Cargando entorno...</div>
        </header>

        <form id="loginForm" style="display: none;" class="px-2">
            <div class="form-group">
                <input type="email" class="clean-input" id="email" placeholder="Correo electrónico" required>
            </div>

            <div class="form-group">
                <input type="password" class="clean-input" id="password" placeholder="Contraseña" required>
            </div>

            <div class="form-group mt-5">
                <button type="submit" class="btn-primary-custom">Iniciar Sesión</button>
            </div>

            <div class="text-center mt-4">
                <span class="text-muted small">No tienes cuenta? <a href="#" class="text-primary fw-bold text-decoration-none">Regístrate</a></span>
                <p class="text-muted mt-4" style="font-size: 0.65rem;">Demo: prueba@prueba.com / password123</p>
            </div>
        </form>

    </main>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').fadeIn(1000);

            $('#loginForm').submit(function (e) {
                e.preventDefault();
                const email = $('#email').val();
                const password = $('#password').val();

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    $('#loginForm').effect("shake", { times: 3, distance: 8 }, 400);
                    $('#successMsg').slideUp();
                    $('#errorMsg').text('Formato de correo inválido.').hide().slideDown();
                    return;
                }

                const usuario = JSON.parse(localStorage.getItem('billetera_usuario'));

                if (email === usuario.email && password === usuario.password) {
                    $('#errorMsg').slideUp();
                    $('#successMsg').slideDown();

                    $('.btn-primary-custom')
                        .prop('disabled', true)
                        .html('<div class="spinner-border spinner-border-sm"></div>');

                    setTimeout(function() {
                        window.location.href = 'menu.html';
                    }, 1500);
                } else {
                    $('#loginForm').effect("shake", { times: 3, distance: 8 }, 400);
                    $('#successMsg').slideUp();
                    $('#errorMsg').hide().slideDown();
                }
            });
        });
    </script>
</body>
</html>
