<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Módulo de Envío</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
        <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <main class="billetera-container">

        <header class="page-header pb-0 border-0">
            <a href="menu.html" class="back-btn"><i class="bi bi-chevron-left"></i></a>
            <h2 class="page-title w-100 text-center pe-4">Enviar Dinero</h2>
        </header>

        <div class="px-4 mt-3">
                        <div class="balance-card mb-4 text-start bg-white shadow-sm" style="padding: 1.2rem; border-radius: 20px; border: 1px solid #eee;">
                <p class="text-muted small fw-bold mb-1">Saldo Disponible</p>
                <h3 class="text-primary fw-bold m-0" id="avlBalance">$0</h3>
            </div>

                        <div id="contactSelectionArea">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Para:</label>
                    <button class="btn btn-sm text-primary fw-bold" id="toggleContactForm">
                        <i class="bi bi-plus-circle"></i> Nuevo
                    </button>
                </div>

                                <div class="ui-widget position-relative">
                    <input type="text" id="contactSearch" class="clean-input ps-5" placeholder="Buscar contacto..." autocomplete="off">
                    <i class="bi bi-search position-absolute text-muted" style="left: 15px; top: 15px;"></i>
                    <input type="hidden" id="selectedContactIndex">
                </div>

                                <div id="selectedContactCard" class="item-card mt-3" style="display:none; box-shadow: 0 5px 15px rgba(138, 76, 255, 0.1); border: 1px solid rgba(138,76,255,0.2);">
                    <div class="item-left">
                        <div class="item-icon bg-light text-primary"><i class="bi bi-person-fill"></i></div>
                        <div>
                            <p class="item-name" id="scName">-</p>
                            <p class="item-date" id="scBank">-</p>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm rounded-circle text-muted" id="clearSelection"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>

                        <div id="newContactContainer" class="mt-3 p-3 bg-white rounded-4 shadow-sm" style="display: none; border: 1px solid #eee;">
                <h6 class="fw-bold text-primary mb-3">Agregar Contacto</h6>
                <form id="newContactForm">
                    <input type="text" class="clean-input mb-2 py-2" id="cName" placeholder="Nombre completo" required>
                    <input type="text" class="clean-input mb-2 py-2" id="cCbu" pattern="\\d{22}" title="22 dígitos exactos" placeholder="CBU (22 Num)" required>
                    <input type="text" class="clean-input mb-2 py-2" id="cAlias" placeholder="Alias" required>
                    <input type="text" class="clean-input mb-3 py-2" id="cBank" placeholder="Banco" required>

                    <div class="d-flex text-end">
                        <button type="button" class="btn btn-light rounded-3 ms-auto me-2 px-3 fw-bold text-muted" id="btnCancelContact">Cancelar</button>
                        <button type="submit" class="btn btn-primary bg-primary border-0 rounded-3 px-3 fw-bold">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <form id="sendForm" style="display: none;" class="mt-4 px-4 h-100 position-relative">
            <div class="text-center mt-2">
                <p class="text-muted small fw-bold mb-0">Monto</p>
                <div class="d-flex justify-content-center align-items-center">
                    <span class="fs-1 fw-bold text-primary me-1">$</span>
                    <input type="number" class="large-amount-input m-0 text-start w-75 p-0" id="sendAmount" placeholder="0" min="1" step="1" required>
                </div>
            </div>

            <div id="statusMsg" class="alert-custom alert border-0 mt-3 text-center text-white fw-bold py-2" style="display: none;"></div>

                        <div class="w-100" style="position: absolute; bottom: 40px; left: 0;">
                <button type="submit" id="btnSendMoney" class="btn-primary-custom w-100 rounded-pill fs-5">Transferir</button>
            </div>
        </form>

            </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {

            $('#avlBalance').text('$' + obtenerSaldo().toLocaleString('es-CL'));

            function recargarAutocomplete() {
                const contactos = obtenerContactos();
                const sourceData = contactos.map((c, index) => ({
                    label: c.name + " (" + c.bank + ")", 
                    value: c.name,
                    index: index,
                    details: c
                }));

                $('#contactSearch').autocomplete({
                    source: sourceData,
                    minLength: 0,
                    select: function(event, ui) {
                        $('#selectedContactIndex').val(ui.item.index);
                        $('#scName').text(ui.item.details.name);
                        $('#scBank').text('CBU ' + ui.item.details.cbu.substring(0,8) + '...');

                        $('#contactSearch').hide();
                        $('#selectedContactCard').slideDown(200);
                        $('#sendForm').fadeIn(400);
                    }
                }).focus(function () {
                    $(this).autocomplete("search", "");
                });
            }

            recargarAutocomplete();

            $('#clearSelection').click(function() {
                $('#selectedContactCard').hide();
                $('#contactSearch').val('').show().focus();
                $('#selectedContactIndex').val('');
                $('#sendForm').hide();
            });

            $('#toggleContactForm').click(function() {
                $('#newContactContainer').slideToggle(300);
            });
            $('#btnCancelContact').click(function() {
                $('#newContactContainer').slideUp(300);
                $('#newContactForm')[0].reset();
            });

            $('#newContactForm').submit(function(e) {
                e.preventDefault();
                const cbu = $('#cCbu').val().trim();

                if (cbu.length !== 22 || isNaN(cbu)) {
                    $(this).effect("shake", { times:3 }, 400);
                    return;
                }

                agregarContacto({
                    name: $('#cName').val(), cbu: cbu, alias: $('#cAlias').val(), bank: $('#cBank').val()
                });
                recargarAutocomplete();

                this.reset();
                $('#newContactContainer').slideUp();

                $('body').append('<div class="position-fixed top-0 start-50 translate-middle-x mt-3 bg-success text-white px-4 py-2 rounded-pill shadow-lg z-3" id="toast">✅ Guardado</div>');
                setTimeout(() => $('#toast').fadeOut(400, function(){ $(this).remove(); }), 2000);
            });

            $('#sendForm').submit(function(e) {
                e.preventDefault();
                const monto = parseFloat($('#sendAmount').val());
                const index = $('#selectedContactIndex').val();

                const saldoActual = obtenerSaldo();

                if (monto > saldoActual) {
                    $('#sendAmount').effect("shake", {times: 3, distance:15}, 400).css('color', '#EF4444');
                    setTimeout(() => $('#sendAmount').css('color', ''), 1000);
                    return;
                }

                const contacto = obtenerContactos()[index];
                actualizarSaldo(saldoActual - monto);
                agregarMovimiento('Envío', monto, `${contacto.name}`);

                $('#btnSendMoney').prop('disabled', true).html('<div class="spinner-border spinner-border-sm"></div>');

                $('#sendForm .text-center').first().fadeOut(200, function() {
                    $(this).html(`
                        <div class="bg-success rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width:100px; height:100px;">
                            <i class="bi bi-check-lg text-white" style="font-size: 4rem;"></i>
                        </div>
                        <h3 class="fw-bold text-dark">¡Transferencia Exitosa!</h3>
                        <p class="text-muted">A ${contacto.name}</p>
                    `).fadeIn();

                    $('#btnSendMoney').html('Volver').prop('disabled', false).click(function(ev){
                        ev.preventDefault();
                        window.location.href='menu.html';
                    });
                });
            });
        });
    </script>
</body>
</html>
